<html>
    <head>
        <link rel="stylesheet" type="text/css" href="styles.css">

        <script src="calculator.js" defer></script>
    </head>
    <body>
        <!-- HTML Comment. Hello! -->
        <p id=""title"> Server-side Calculator</p>
        <!-- 'for' in label will connect this label to input for clicking-->
        <div>
            <label for=""x_value">X: </label> 
            <input id="x_value"></input>
        </div>
        <br/>
        <div>
            <label for=""y_value">Y: </label> 
            <input id="y_value"></input>
        </div>
        <hr/>
        <div>
            <label for=""result_value">Result: </label> 
            <input id="result_value"></input>
        </div>
    </body>
</html>
